<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Instagram</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fafafa;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .profile img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }

    .stats {
      display: flex;
      gap: 15px;
      margin: 10px 0;
    }

    .stats div {
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .gallery img {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }

    /* Desktop */
    @media (min-width: 600px) {
      .profile {
        flex-direction: row;
        align-items: center;
        text-align: left;
        gap: 30px;
      }

      .profile-info {
        display: flex;
        flex-direction: column;
      }

      .gallery img {
        height: 200px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="profile">
    <img src="perfil.jpg">

    <div class="profile-info">
      <h2>usuario123</h2>

      <div class="stats">
        <div><strong>50</strong> publicaciones</div>
        <div><strong>1200</strong> seguidores</div>
        <div><strong>300</strong> seguidos</div>
      </div>

      <p><strong>Juan Pérez</strong></p>
      <p>Descripción del perfil</p>
    </div>
  </div>

  <div class="gallery">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
    <img src="img5.jpg">
    <img src="img6.jpg">
  </div>

</div>

</body>
</html>

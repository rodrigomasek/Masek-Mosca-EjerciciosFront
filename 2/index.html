<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Centrar con Flex</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center; /* horizontal */
      align-items: center;     /* vertical */
      background: #f0f0f0;
    }

    .box {
      width: 200px;
      height: 200px;
      background: steelblue;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="box">Centrado</div>
</body>
</html>
